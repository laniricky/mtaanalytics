<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background -->
  <rect x="24" y="24" width="464" height="464" rx="100" fill="#202428" />

  <defs>
    <!-- Gradient to perfectly split the 'M' colors down the sharp miter vertex -->
    <linearGradient id="mSplit" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="50%" stop-color="#606264" />
      <stop offset="50%" stop-color="#f37a1f" />
    </linearGradient>
  </defs>

  <!-- Horizontal Base Line -->
  <line x1="92" y1="340" x2="414" y2="340" stroke="#606264" stroke-width="8" stroke-linecap="round" />

  <!-- Stylized 'M' Shape -->
  <path d="M 110 315 L 110 170 L 205 275 L 300 170 L 300 315" 
        fill="none" 
        stroke="url(#mSplit)" 
        stroke-width="18" 
        stroke-linecap="round" 
        stroke-linejoin="miter" 
        stroke-miterlimit="4" />
  
  <!-- Vertical Data Bars -->
  <line x1="332" y1="260" x2="332" y2="315" stroke="#606264" stroke-width="18" stroke-linecap="round" />
  <line x1="364" y1="225" x2="364" y2="315" stroke="#606264" stroke-width="18" stroke-linecap="round" />
  <line x1="396" y1="185" x2="396" y2="315" stroke="#f37a1f" stroke-width="18" stroke-linecap="round" />
</svg>
